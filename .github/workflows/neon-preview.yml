name: Neon preview branch + CI

# Creates a per-PR Neon database branch, applies migrations, runs build +
# unit tests against it, and posts a schema diff comment. Typecheck, lint,
# and prettier run as standalone parallel jobs (no Neon branch needed).
# The branch is torn down when the PR closes.
#
# Configured secrets/vars (provisioned by the Neon GitHub App):
#   - secrets.NEON_API_KEY
#   - vars.NEON_PROJECT_ID

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  setup:
    name: Setup
    outputs:
      branch: ${{ steps.branch_name.outputs.current_branch }}
    runs-on: ubuntu-latest
    steps:
      - name: Get branch name
        id: branch_name
        uses: tj-actions/branch-names@v8

  typecheck:
    # Standalone job so it runs in parallel with the preview/test job and
    # gives fast feedback without waiting on Neon branch creation. No DB,
    # no migrations — just `tsc --noEmit` on both tsconfigs.
    name: TypeScript typecheck
    if: |
      github.event_name == 'pull_request' && (
        github.event.action == 'opened'
        || github.event.action == 'reopened'
        || github.event.action == 'synchronize'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  quality:
    # Standalone parallel job, same pattern as typecheck. Lint and prettier
    # don't need a Neon branch or a build, so there's no reason to block
    # them on preview_and_test. Both steps fail the build on non-zero exit;
    # lint is exit 0 with warnings, so warnings don't block.
    name: Lint + format check
    if: |
      github.event_name == 'pull_request' && (
        github.event.action == 'opened'
        || github.event.action == 'reopened'
        || github.event.action == 'synchronize'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Prettier format check
        run: npm run format:check

  preview_and_test:
    name: Preview branch + CI
    needs: setup
    if: |
      github.event_name == 'pull_request' && (
        github.event.action == 'opened'
        || github.event.action == 'reopened'
        || github.event.action == 'synchronize'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create Neon branch
        id: create_neon_branch
        uses: neondatabase/create-branch-action@v5
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Apply migrations
        env:
          # Output is marked as a secret by the action; it's masked in logs.
          DATABASE_URL: ${{ steps.create_neon_branch.outputs.db_url_with_pooler }}
        run: |
          set -euo pipefail
          # Apply in the same order we'd run at deploy. Each file is idempotent
          # (CREATE TABLE IF NOT EXISTS, ADD COLUMN IF NOT EXISTS, or a DO
          # block guarding a constraint) so re-runs on PR synchronize succeed.
          for f in \
            database/migrations/add-user-api-usage.sql \
            database/migrations/add-global-monthly-usage.sql \
            database/migrations/add-chart-files.sql \
            database/migrations/add-user-byok-keys.sql \
            database/migrations/add-logging-messages-cost.sql \
            database/migrations/add-idempotency-keys.sql \
            database/migrations/freeze-user-token-usage.sql; do
            echo "applying $f"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -q -f "$f"
          done

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Coverage report
        # Runs vitest with V8 coverage; logs the text summary and keeps the
        # full report as a workflow artifact. Intentionally unguarded for now —
        # we want a baseline before setting a floor.
        # TODO: once the baseline is measured, enforce a coverage floor of
        # ~60% on worker/_shared/ (lines/branches) via vitest's
        # `coverage.thresholds` config and let this step fail on regression.
        run: npm run test:coverage

      - name: Upload coverage artifact
        # Keep reports even if the previous step failed so we can debug
        # coverage-tool breakage on the branch.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.event.number }}
          path: coverage/
          if-no-files-found: warn
          retention-days: 14

      - name: Schema diff comment
        # Posts the schema delta between the PR preview branch and its parent
        # to the PR as a comment. Useful for reviewing migration impact.
        uses: neondatabase/schema-diff-action@v1
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          compare_branch: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}

  delete_neon_branch:
    name: Delete Neon branch
    needs: setup
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Neon branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
