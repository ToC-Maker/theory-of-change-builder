# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # npm packages (package.json at repo root)
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    target-branch: 'main'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'chore'
      include: 'scope'
    # Wait 7 days after a release before proposing it. Lets obvious
    # post-release bug fixes land upstream before we pull them in.
    # Note: cooldown applies to version updates only, not security updates.
    cooldown:
      default-days: 7
      include:
        - '*'
    # Aggregate minor + patch bumps into a single weekly PR. Major bumps
    # stay un-grouped so each one gets its own reviewable PR.
    groups:
      npm-minor-and-patch:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'

  # GitHub Actions (workflows under .github/workflows)
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    target-branch: 'main'
    open-pull-requests-limit: 3
    labels:
      - 'dependencies'
      - 'github-actions'
    commit-message:
      prefix: 'chore'
      include: 'scope'
    cooldown:
      default-days: 7
      include:
        - '*'
    groups:
      actions-minor-and-patch:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
