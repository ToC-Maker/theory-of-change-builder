[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

# Block WordPress bot requests
[[redirects]]
  from = "/wp-admin/*"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/wordpress/*"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/xmlrpc.php"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/**/wp-includes/*"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/**/wp-content/*"
  to = "/404"
  status = 404
  force = true

# SPA fallback - temporarily disabled for debugging
# [[redirects]]
#   from = "/*"
#   to = "/index.html"
#   status = 200
#   force = false

[functions]
  node_bundler = "esbuild"

[[edge_functions]]
  path = "/api/anthropic-stream"
  function = "anthropic-stream"

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5173
  autoLaunch = false