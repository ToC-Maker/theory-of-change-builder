[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"
  # Auth0 Client ID and Domain are safe to expose in client-side code
  # This is standard for Single Page Applications using Auth0
  SECRETS_SCAN_OMIT_KEYS = "VITE_AUTH0_CLIENT_ID,VITE_AUTH0_DOMAIN,AUTH0_CLIENT_ID,AUTH0_DOMAIN"

# Block WordPress bot requests
[[redirects]]
  from = "/wp-admin/*"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/wordpress/*"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/xmlrpc.php"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/**/wp-includes/*"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/**/wp-content/*"
  to = "/404"
  status = 404
  force = true

# Exclude Vite dev server paths from redirects
[[redirects]]
  from = "/@vite/*"
  to = "/@vite/:splat"
  status = 200

[[redirects]]
  from = "/@react-refresh"
  to = "/@react-refresh"
  status = 200

[[redirects]]
  from = "/src/*"
  to = "/src/:splat"
  status = 200

[[redirects]]
  from = "/node_modules/*"
  to = "/node_modules/:splat"
  status = 200

# SPA fallback - REQUIRED for production routes to work
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# Security headers for all routes
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[functions]
  node_bundler = "esbuild"

[[edge_functions]]
  path = "/api/anthropic-stream"
  function = "anthropic-stream"

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5173
  autoLaunch = false